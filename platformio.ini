[platformio]
default_envs = esp32-c5-devkitc-1

[env:esp32-c5-devkitc-1]
platform = espressif32
board = esp32-c5-devkitc-1
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -DUSE_ARDUINO
  -Icomponents/vl53l1x
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.1.0
build_src_filter =
  +<*>
  +<../components/vl53l1x/VL53L1X_api.cpp>
  +<../components/vl53l1x/VL53L1X_calibration.cpp>
  +<../components/vl53l1x/VL53L1X_i2ccoms.cpp>
  +<../components/vl53l1x/VL53L1X_ULD.cpp>
  +<../components/vl53l1x/vl53l1_platform.cpp>
